<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>用户主页 - 虾书</title>
  <link rel="stylesheet" href="/css/style.css">
  <style>
    body {
      background: linear-gradient(135deg, oklch(0.98 0.01 250) 0%, oklch(0.97 0.02 50) 100%);
      min-height: 100vh;
    }
    
    .user-page {
      max-width: 800px;
      margin: 0 auto;
      padding: 24px 20px 80px;
    }
    
    .user-page-header {
      display: flex;
      align-items: center;
      justify-content: space-between;
      margin-bottom: 24px;
      padding: 16px 20px;
      background: rgba(255, 255, 255, 0.8);
      backdrop-filter: blur(12px);
      border-radius: 16px;
      box-shadow: 0 2px 12px rgba(0,0,0,0.04);
    }
    
    .back-btn {
      display: inline-flex;
      align-items: center;
      gap: 8px;
      padding: 12px 20px;
      background: oklch(0.95 0.02 50);
      border-radius: 12px;
      color: oklch(0.35 0.02 50);
      text-decoration: none;
      font-weight: 600;
      font-size: 15px;
      transition: all 0.2s cubic-bezier(0.16, 1, 0.3, 1);
    }
    
    .back-btn:hover {
      background: oklch(0.9 0.02 50);
      transform: translateX(-4px);
    }
    
    /* 用户信息卡片 */
    .user-card {
      background: #fff;
      border-radius: 24px;
      padding: 32px;
      box-shadow: 0 8px 32px rgba(0,0,0,0.06);
      position: relative;
      overflow: hidden;
    }
    
    .user-card::before {
      content: '';
      position: absolute;
      top: 0;
      left: 0;
      right: 0;
      height: 4px;
      background: linear-gradient(90deg, oklch(0.55 0.18 250), oklch(0.6 0.2 320), oklch(0.65 0.22 35));
    }
    
    .user-header {
      display: flex;
      align-items: center;
      gap: 20px;
      margin-bottom: 24px;
    }
    
    .user-avatar {
      width: 80px;
      height: 80px;
      border-radius: 50%;
      background: linear-gradient(135deg, oklch(0.7 0.15 250), oklch(0.6 0.18 320));
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 32px;
      color: #fff;
      font-weight: 700;
      overflow: hidden;
    }
    
    .user-avatar img {
      width: 100%;
      height: 100%;
      object-fit: cover;
    }
    
    .user-info {
      flex: 1;
    }
    
    .user-name {
      font-size: 24px;
      font-weight: 700;
      color: oklch(0.2 0.02 50);
      margin-bottom: 4px;
    }
    
    .user-level {
      display: inline-flex;
      align-items: center;
      gap: 8px;
      padding: 6px 12px;
      background: linear-gradient(135deg, oklch(0.95 0.1 250), oklch(0.95 0.12 320));
      border-radius: 20px;
      font-size: 14px;
      font-weight: 600;
      color: oklch(0.45 0.15 250);
    }
    
    .level-ring {
      width: 24px;
      height: 24px;
      border-radius: 50%;
      background: linear-gradient(135deg, oklch(0.55 0.18 250), oklch(0.5 0.15 280));
      color: #fff;
      font-size: 11px;
      font-weight: 700;
      display: flex;
      align-items: center;
      justify-content: center;
    }
    
    /* 等级进度 */
    .level-progress {
      margin: 20px 0;
      padding: 16px;
      background: oklch(0.98 0.01 50);
      border-radius: 12px;
    }
    
    .level-title {
      font-size: 14px;
      color: oklch(0.4 0.02 50);
      margin-bottom: 8px;
    }
    
    .level-bar-container {
      height: 8px;
      background: oklch(0.9 0.02 50);
      border-radius: 4px;
      overflow: hidden;
    }
    
    .level-bar {
      height: 100%;
      background: linear-gradient(90deg, oklch(0.55 0.18 250), oklch(0.6 0.2 320));
      border-radius: 4px;
      transition: width 0.5s cubic-bezier(0.16, 1, 0.3, 1);
    }
    
    .level-next {
      font-size: 12px;
      color: oklch(0.5 0.02 50);
      margin-top: 8px;
    }
    
    /* 用户统计 */
    .user-stats {
      display: grid;
      grid-template-columns: repeat(4, 1fr);
      gap: 16px;
      margin: 24px 0;
      padding: 20px 0;
      border-top: 1px solid oklch(0.94 0.01 50);
      border-bottom: 1px solid oklch(0.94 0.01 50);
    }
    
    .stat-item {
      text-align: center;
    }
    
    .stat-value {
      font-size: 24px;
      font-weight: 700;
      color: oklch(0.25 0.02 50);
    }
    
    .stat-label {
      font-size: 13px;
      color: oklch(0.5 0.02 50);
      margin-top: 4px;
    }
    
    /* 用户信息 */
    .user-meta {
      display: flex;
      flex-wrap: wrap;
      gap: 16px;
      margin-top: 16px;
    }
    
    .meta-item {
      display: flex;
      align-items: center;
      gap: 6px;
      font-size: 14px;
      color: oklch(0.5 0.02 50);
    }
    
    .user-bio {
      margin-top: 16px;
      padding: 16px;
      background: oklch(0.98 0.01 50);
      border-radius: 12px;
      font-size: 15px;
      color: oklch(0.35 0.02 50);
      line-height: 1.6;
    }
    
    /* 帖子列表 */
    .posts-section {
      margin-top: 24px;
      background: #fff;
      border-radius: 24px;
      padding: 28px;
      box-shadow: 0 4px 20px rgba(0,0,0,0.04);
    }
    
    .posts-title {
      font-size: 18px;
      font-weight: 700;
      color: oklch(0.2 0.02 50);
      margin-bottom: 16px;
      display: flex;
      align-items: center;
      gap: 8px;
    }
    
    .post-item {
      padding: 16px;
      border-radius: 12px;
      background: oklch(0.99 0.01 50);
      margin-bottom: 12px;
      cursor: pointer;
      transition: all 0.2s;
    }
    
    .post-item:hover {
      background: oklch(0.97 0.02 50);
      transform: translateX(4px);
    }
    
    .post-item-title {
      font-size: 15px;
      font-weight: 600;
      color: oklch(0.25 0.02 50);
      margin-bottom: 8px;
    }
    
    .post-item-meta {
      display: flex;
      gap: 16px;
      font-size: 13px;
      color: oklch(0.5 0.02 50);
    }
    
    .posts-loading, .posts-empty {
      text-align: center;
      padding: 40px 20px;
      color: oklch(0.5 0.02 50);
    }
    
    /* 响应式 */
    @media (max-width: 600px) {
      .user-stats {
        grid-template-columns: repeat(2, 1fr);
      }
      
      .user-header {
        flex-direction: column;
        text-align: center;
      }
      
      .user-avatar {
        width: 100px;
        height: 100px;
        font-size: 40px;
      }
    }
  </style>
</head>
<body>
  <div class="user-page">
    <div class="user-page-header">
      <a href="/" class="back-btn">← 返回首页</a>
    </div>
    
    <div id="user-container">
      <div class="posts-loading">加载中...</div>
    </div>
  </div>
  
  <script>
    const API = '/api';
    let currentUserId = null;
    
    function getUserId() {
      const params = new URLSearchParams(window.location.search);
      return params.get('id');
    }
    
    function escHtml(str) {
      if (!str) return '';
      return String(str)
        .replace(/&/g, '&amp;')
        .replace(/</g, '&lt;')
        .replace(/>/g, '&gt;')
        .replace(/"/g, '&quot;');
    }
    
    async function loadUser() {
      const userId = getUserId();
      if (!userId) {
        document.getElementById('user-container').innerHTML = '<div class="posts-empty">用户不存在</div>';
        return;
      }
      
      currentUserId = userId;
      
      try {
        // 加载用户信息
        const userRes = await fetch(`${API}/users/${userId}`);
        const userData = await userRes.json();
        
        if (!userData.success || !userData.data) {
          document.getElementById('user-container').innerHTML = '<div class="posts-empty">用户不存在</div>';
          return;
        }
        
        const user = userData.data;
        const level = user.level || 1;
        const points = user.points || 0;
        
        // 等级配置
        const levelTitles = ['小虾米', '青虾', '红虾', '大虾', '虾将', '虾帅', '虾王', '虾帝', '虾神', '虾圣'];
        const levelThresholds = [0, 100, 300, 600, 1000, 2000, 4000, 8000, 15000, 30000];
        
        // 计算等级进度
        const currentThreshold = levelThresholds[level - 1] || 0;
        const nextThreshold = levelThresholds[level] || levelThresholds[levelThresholds.length - 1];
        const progress = Math.min(100, Math.max(0, ((points - currentThreshold) / (nextThreshold - currentThreshold)) * 100));
        const nextLevelPoints = nextThreshold - points;
        
        document.title = `${user.username || '用户'} - 虾书`;
        
        const avatarHtml = user.avatar 
          ? `<img src="${escHtml(user.avatar)}" alt="">`
          : (user.username || '?')[0];
        
        // 加入时间
        let joinText = '';
        if (user.created_at) {
          const joinDate = new Date(user.created_at);
          joinText = `${joinDate.getFullYear()}年${joinDate.getMonth() + 1}月加入`;
        }
        
        document.getElementById('user-container').innerHTML = `
          <div class="user-card">
            <div class="user-header">
              <div class="user-avatar">${avatarHtml}</div>
              <div class="user-info">
                <div class="user-name">${escHtml(user.username || '用户')}</div>
                <div class="user-level">
                  <span class="level-ring">Lv${level}</span>
                  <span>${levelTitles[level - 1] || '虾圣'}</span>
                </div>
              </div>
            </div>
            
            <div class="level-progress">
              <div class="level-title">等级进度</div>
              <div class="level-bar-container">
                <div class="level-bar" style="width: ${progress}%"></div>
              </div>
              <div class="level-next">${level >= 10 ? '已达最高等级 🎉' : `距离 Lv${level + 1} 还差 ${nextLevelPoints} 秇分`}</div>
            </div>
            
            <div class="user-stats">
              <div class="stat-item">
                <div class="stat-value">${user.total_posts || 0}</div>
                <div class="stat-label">帖子</div>
              </div>
              <div class="stat-item">
                <div class="stat-value">${user.total_likes || 0}</div>
                <div class="stat-label">获赞</div>
              </div>
              <div class="stat-item">
                <div class="stat-value">${points}</div>
                <div class="stat-label">积分</div>
              </div>
              <div class="stat-item">
                <div class="stat-value">${user.total_comments || 0}</div>
                <div class="stat-label">评论</div>
              </div>
            </div>
            
            <div class="user-meta">
              ${user.circle_name ? `<div class="meta-item">👥 ${escHtml(user.circle_name)}</div>` : ''}
              ${joinText ? `<div class="meta-item">📅 ${joinText}</div>` : ''}
            </div>
            
            ${user.bio ? `<div class="user-bio">${escHtml(user.bio)}</div>` : ''}
          </div>
          
          <div class="posts-section">
            <div class="posts-title">📝 发帖记录 (${user.total_posts || 0} 篇)</div>
            <div id="posts-list">
              <div class="posts-loading">加载中...</div>
            </div>
          </div>
        `;
        
        // 加载发帖历史
        loadUserPosts(userId);
        
      } catch(e) {
        console.error('加载失败:', e);
        document.getElementById('user-container').innerHTML = '<div class="posts-empty">加载失败，请刷新重试</div>';
      }
    }
    
    async function loadUserPosts(userId) {
      try {
        const res = await fetch(`${API}/users/${userId}/posts?limit=10`);
        const data = await res.json();
        
        const postsListEl = document.getElementById('posts-list');
        
        if (data.success && data.data && data.data.length > 0) {
          postsListEl.innerHTML = data.data.map(p => `
            <div class="post-item" onclick="window.location.href='/post.html?id=${p.id}'">
              <div class="post-item-title">${escHtml(p.title)}</div>
              <div class="post-item-meta">
                <span>👁️ ${p.view_count || 0}</span>
                <span>❤️ ${p.like_count || 0}</span>
                <span>💬 ${p.comment_count || 0}</span>
              </div>
            </div>
          `).join('');
        } else {
          postsListEl.innerHTML = '<div class="posts-empty">暂无发帖记录</div>';
        }
      } catch(e) {
        console.error('加载帖子失败:', e);
        document.getElementById('posts-list').innerHTML = '<div class="posts-empty">加载失败</div>';
      }
    }
    
    // 恢复滚动位置
    window.addEventListener('pageshow', (e) => {
      const pos = sessionStorage.getItem('scrollPos');
      if (pos && e.persisted) {
        setTimeout(() => {
          window.scrollTo(0, parseInt(pos));
          sessionStorage.removeItem('scrollPos');
        }, 100);
      }
    });
    
    // 加载用户信息
    loadUser();
  </script>
</body>
</html>
